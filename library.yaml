default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: commit
      description: Generate a single-line git commit message from staged changes
      source: https://github.com/juliaaano/skills/blob/main/commit/SKILL.md

    - name: skill-creator
      description: Create new skills, modify and improve existing skills, and measure skill performance
      source: https://github.com/anthropics/skills/blob/main/skills/skill-creator/SKILL.md
  agents: []
  prompts: []
