default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: commit
      description: Generate a single-line git commit message from staged changes
      source: https://github.com/juliaaano/skills/blob/main/commit/SKILL.md

    - name: search
      description: Search the web and answer questions using up-to-date information from the internet
      source: https://github.com/juliaaano/skills/blob/main/search/SKILL.md

    - name: showroom-skills
      description: Install showroom skills, agents, prompts, templates, and docs from the RHDP Skills Marketplace
      source: https://github.com/juliaaano/skills/blob/main/showroom-skills/SKILL.md

    - name: mcp-builder
      description: Guide for creating high-quality MCP (Model Context Protocol) servers that enable LLMs to interact with external services through well-designed tools
      source: https://github.com/anthropics/skills/blob/main/skills/mcp-builder/SKILL.md

    - name: order-ci
      description: Orders a Catalog Item from the Red Hat demo catalog via Playwright browser automation
      source: https://github.com/juliaaano/skills/blob/main/order-ci/SKILL.md

    - name: pdf
      description: Read, create, merge, split, rotate, watermark, encrypt, OCR, and manipulate PDF files
      source: https://github.com/anthropics/skills/blob/main/skills/pdf/SKILL.md

    - name: playwright-cli
      description: Automates browser interactions for web testing, form filling, screenshots, and data extraction
      source: https://github.com/microsoft/playwright-cli/blob/main/skills/playwright-cli/SKILL.md

    - name: scrape
      description: Scrape a web page using Firecrawl and answer questions about its content
      source: https://github.com/juliaaano/skills/blob/main/scrape/SKILL.md

    - name: skill-creator
      description: Create new skills, modify and improve existing skills, and measure skill performance
      source: https://github.com/anthropics/skills/blob/main/skills/skill-creator/SKILL.md
  agents: []
  prompts: []
